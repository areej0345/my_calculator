<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">  ← ADD KARO
  <title>My Calculator</title>
  <link rel="stylesheet" href="style.css">
  <!-- PWA Support -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#f39c12">
</head>
<body>

  <div class="app-wrapper">

    <!-- ===== CALCULATOR ===== -->
    <div class="calculator">

      <!-- Mode Tabs -->
      <div class="mode-tabs">
        <button class="tab active" id="tab-basic">Basic</button>
        <button class="tab" id="tab-sci">Scientific</button>
      </div>

      <!-- Display -->
      <div class="display">
        <span id="expr"></span>
        <div class="display-row">
          <button data-action="backspace" id="backspace-btn">⌫</button>
          <span id="screen">0</span>
        </div>
      </div>

      <!-- Memory Row -->
      <div class="memory-row">
        <button data-action="mc">MC</button>
        <button data-action="mr">MR</button>
        <button data-action="mplus">M+</button>
        <button data-action="ms">MS</button>
      </div>

      <!-- Scientific Buttons (hidden by default) -->
      <div class="sci-buttons" id="sci-buttons">
        <button data-action="sci" data-value="sin">sin</button>
        <button data-action="sci" data-value="cos">cos</button>
        <button data-action="sci" data-value="tan">tan</button>
        <button data-action="sci" data-value="log">log</button>
        <button data-action="sci" data-value="ln">ln</button>
        <button data-action="sci" data-value="sqrt">√x</button>
        <button data-action="sci" data-value="sq">x²</button>
        <button data-action="sci" data-value="cube">x³</button>
        <button data-action="sci" data-value="inv">1/x</button>
        <button data-action="sci" data-value="pi">π</button>
      </div>

      <!-- Main Buttons -->
      <div class="buttons">
        <button data-action="clear">AC</button>
        <button data-action="sign">+/−</button>
        <button data-action="percent">%</button>
        <button data-action="op" data-value="÷">÷</button>

        <button data-action="num" data-value="7">7</button>
        <button data-action="num" data-value="8">8</button>
        <button data-action="num" data-value="9">9</button>
        <button data-action="op" data-value="×">×</button>

        <button data-action="num" data-value="4">4</button>
        <button data-action="num" data-value="5">5</button>
        <button data-action="num" data-value="6">6</button>
        <button data-action="op" data-value="−">−</button>

        <button data-action="num" data-value="1">1</button>
        <button data-action="num" data-value="2">2</button>
        <button data-action="num" data-value="3">3</button>
        <button data-action="op" data-value="+">+</button>

        <button data-action="num" data-value="0" class="zero">0</button>
        <button data-action="decimal">.</button>
        <button data-action="equals">=</button>
      </div>

    </div>

    <!-- ===== HISTORY PANEL ===== -->
    <div class="history-panel">
      <div class="history-header">
        <span>History</span>
        <button id="clear-hist">Clear</button>
      </div>
      <ul id="history-list">
        <li class="hist-empty">No calculations yet</li>
      </ul>
    </div>

  </div>

  <script src="calc.js"></script>
  <script>
  // Service Worker register karo
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js');
  }
</script>
</body>
</html>
